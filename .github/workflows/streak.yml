name: Daily Streak

on:
  schedule:
    # Runs every day at 04:00 UTC (09:30 IST)
    - cron: '0 4 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update streak file
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> streak.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add streak.txt

          git diff --staged --quiet || git commit -m "Daily streak update"

      - name: Push changes
        run: git push